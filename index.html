<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Bangers&display=swap" rel="stylesheet">
  
  <style>
    /* Your existing CSS stays exactly the same - I kept it short here for space */
    :root {
      --bg-deep: #0a132f;
      --bg-panel: #0f1a47;
      --accent-red: #ff2d55;
      --accent-orange: #ff9500;
      --accent-cyan: #00f0ff;
      --text-primary: #e0f7ff;
      --text-secondary: #a5d8ff;
      --card-border: rgba(0, 240, 255, 0.14);
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--bg-deep);
      color: var(--text-primary);
      font-family: 'Orbitron', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ... (keep all your existing styles for header, hero, menu, footer, mobile) ... */
  </style>
</head>
<body>

  <!-- Your header, main, and footer content stays the same -->

  <header>
    <div class="header-inner">
      <a href="https://www.sk8coin.io/" class="logo-link">
        <img src="https://i.postimg.cc/VSvxfXsr/sk8coin-logo-biig.png" alt="SK8COIN Logo" class="logo">
      </a>

      <nav>
        <ul>
          <li><a href="#">Home</a></li>
          <li><a href="#">Market</a></li>
          <li><a href="#">Builder</a></li>
          <li><a href="#">Shop</a></li>
          <li><a href="#">Metazine</a></li>
          <li><a href="#">Discord</a></li>
        </ul>
      </nav>

      <button id="connect-wallet-btn" class="wallet-btn">CONNECT WALLET</button>
    </div>
  </header>

  <!-- Rest of your main and footer here... -->

  <!-- WAXJS Library -->
  <script src="https://cdn.jsdelivr.net/npm/@waxio/waxjs@1.7.1/dist-web/waxjs.js"></script>

  <script>
    let wax = null;
    let userAccount = null;

    function initWax() {
      wax = new waxjs.WaxJS({
        rpcEndpoint: 'https://wax.greymass.com'
      });
    }

    async function connectWallet() {
      const btn = document.getElementById('connect-wallet-btn');
      try {
        btn.innerHTML = 'CONNECTING...';
        btn.disabled = true;

        if (!wax) initWax();

        const user = await wax.login();
        userAccount = user.account;

        btn.style.background = 'linear-gradient(135deg, #00f0ff, #22ff88)';
        btn.innerHTML = `✅ ${userAccount}`;
        alert(`✅ Wallet connected!\n\nAccount: ${userAccount}`);

      } catch (error) {
        console.error(error);
        btn.innerHTML = 'CONNECT WALLET';
        btn.disabled = false;
        alert('Connection failed or cancelled.');
      }
    }

    window.addEventListener('load', () => {
      setTimeout(() => {
        initWax();
        document.getElementById('connect-wallet-btn').addEventListener('click', connectWallet);
      }, 800);

      // Menu hover effects...
      document.querySelectorAll('.menu-item').forEach(item => {
        item.addEventListener('mouseenter', () => {
          item.style.transform = 'translateY(-10px)';
          item.style.boxShadow = '0 16px 40px rgba(0,240,255,0.25), 0 0 0 2px #00f0ff';
        });
        item.addEventListener('mouseleave', () => {
          item.style.transform = 'translateY(0)';
          item.style.boxShadow = '0 6px 20px rgba(0,0,0,0.45)';
        });
      });
    });
  </script>
</body>
</html>
