<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Bangers&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@waxio/waxjs@1.0.0/dist-web/waxjs.js"></script>
  
 <style>
    :root {
      --bg-deep: #0a132f;
      --bg-panel: #0f1a47;
      --accent-red: #ff2d55;
      --accent-orange: #ff9500;
      --accent-cyan: #00f0ff;
      --text-primary: #e0f7ff;
      --text-secondary: #a5d8ff;
      --card-border: rgba(0, 240, 255, 0.14);
    }

    * { margin:0; padding:0; box-sizing:border-box; }
  <body>

  <header>
    <div class="header-inner">
      
      <!-- Logo -->
      <a href="https://www.sk8coin.io/" class="logo-link">
        <img 
          src="https://i.postimg.cc/VSvxfXsr/sk8coin-logo-biig.png" 
          alt="SK8COIN Logo" 
          class="logo">
      </a>

      <!-- Navigation -->
      <nav>
        <ul>
          <li><a href="#">Home</a></li>
          <li><a href="#">Market</a></li>
          <li><a href="#">Builder</a></li>
          <li><a href="#">Shop</a></li>
          <li><a href="#">Metazine</a></li>
          <li><a href="#">Discord</a></li>
        </ul>
      </nav>

      <!-- Wallet Button -->
      <button id="connect-wallet-btn" class="wallet-btn">CONNECT WALLET</button>

    </div>
  </header>

  <main>
    <section class="hero">
      <h1>SKATE2EARN</h1>
      <p style="font-size: 1.5rem; margin: 1.2rem 0 2.2rem; color: var(--text-secondary); max-width: 720px; margin-left: auto; margin-right: auto;">
        Collect, build & earn on-chain — tokenized GameFi meets street culture. 
      </p>

      <div class="stats-row">
        <div class="stat"><span class="stat-value">12.4k</span> Collectors</div>
        <div class="stat"><span class="stat-value">8.7k+</span> NFTs Minted</div>
        <div class="stat"><span class="stat-value">420k</span> Volume</div>
      </div>
    </section>

    <div class="menu-grid">
      <div class="menu-item" onclick="alert('Opening Skate Builder...')">
        <div class="card-content">
          <div class="menu-icon">🛠️</div>
          <div class="menu-title">BUILD & MINT</div>
          <div class="menu-desc">Craft complete boards from parts — mint legendary NFTs & earn rewards</div>
        </div>
      </div>

      <div class="menu-item" onclick="alert('continue to neftblocks...')">
        <div class="card-content">
          <div class="menu-icon">🛒</div>
          <div class="menu-title">PARTS MARKET</div>
          <div class="menu-desc">Buy, sell & trade rare decks, wheels, trucks, bearings</div>
        </div>
      </div>

      <div class="menu-item" onclick="alert('you are now entering the skate shop...')">
        <div class="card-content">
          <div class="menu-icon">🛹</div>
          <div class="menu-title">SKATE SHOP</div>
          <div class="menu-desc">Real merch & gear — pay with $SKATE for exclusive perks</div>
        </div>
      </div>

      <div class="menu-item" onclick="alert('Profile Hub...')">
        <div class="card-content">
          <div class="menu-icon">💰</div>
          <div class="menu-title">GET $SKATE</div>
          <div class="menu-desc">Level up rank, unlock Discord roles & VIP features</div>
        </div>
      </div>

      <div class="menu-item" onclick="window.open('https://fliphtml5.com/bookcase/fxvce/', '_blank')">
        <div class="card-content">
          <div class="menu-icon">📖</div>
          <div class="menu-title">METAZINE</div>
          <div class="menu-desc">Exclusive NFT-gated skate stories, interviews & creator drops</div>
        </div>
      </div>

      <div class="menu-item" onclick="window.open('https://discord.gg/hgWMGpRTaK', '_blank')">
        <div class="card-content">
          <div class="menu-icon"><i class="fab fa-discord"></i></div>
          <div class="menu-title">DISCORD</div>
          <div class="menu-desc">Wallet-linked roles, alerts, battles & giveaways</div>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <p>
      <strong>SK8COIN is more than a token — it's a revolution.</strong><br>
      We are reclaiming skate culture from corporate control and gatekeepers. 
      By putting boards, parts, tricks, and community ownership directly on the blockchain, 
      we empower every skater to own their style, earn from their creativity, 
      and build the future of street culture without middlemen. 
      This is Skate2Earn. This is independence. This is the SK8COIN movement.
    </p>
  </footer>

  <script>
    // === WAX WALLET CONNECTION ===
    let wax = null;
    let userAccount = null;

    function initWax() {
      wax = new waxjs.WaxJS({
        rpcEndpoint: 'https://wax.greymass.com'
      });
    }

    async function connectWallet() {
      const btn = document.getElementById('connect-wallet-btn');
      
      try {
        btn.innerHTML = 'CONNECTING...';
        btn.disabled = true;

        if (!wax) initWax();

        const user = await wax.login();
        userAccount = user.account;

        btn.style.background = 'linear-gradient(135deg, #00f0ff, #22ff88)';
        btn.innerHTML = `✅ ${userAccount}`;
        
        console.log('✅ Wallet connected:', userAccount);
        alert(`Wallet connected successfully!\n\nAccount: ${userAccount}`);

      } catch (error) {
        console.error("Wallet connection error:", error);
        btn.innerHTML = 'CONNECT WALLET';
        btn.disabled = false;
        alert('Connection failed or was cancelled. Please try again.');
      }
    }

    // Run when page is fully loaded
    document.addEventListener('DOMContentLoaded', function() {
      initWax();

      const btn = document.getElementById('connect-wallet-btn');
      if (btn) {
        btn.addEventListener('click', connectWallet);
      }

      // Menu hover effects
      document.querySelectorAll('.menu-item').forEach(item => {
        item.addEventListener('mouseenter', () => {
          item.style.transform = 'translateY(-10px)';
          item.style.boxShadow = '0 16px 40px rgba(0,240,255,0.25), 0 0 0 2px #00f0ff';
        });
        item.addEventListener('mouseleave', () => {
          item.style.transform = 'translateY(0)';
          item.style.boxShadow = '0 6px 20px rgba(0,0,0,0.45)';
        });
      });
    });
  </script>
</body>
</html>
